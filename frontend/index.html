<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Platina</title>
</head>
<body>
    <h1>プラチナ</h1>
    <p>このアプリでは、文章の発音を調べることができます。</p>
    <p>下に入力することでピッチアクセントが表示されます。</p>
    <form id="text-form">
        <textarea id="text-input" rows="4" cols="50" placeholder="ここに文章を入力してください"></textarea><br>
        <button type="submit">発音を調べる</button>
    </form>
    <div id="result"></div>
    <script src="app.js"></script>
</body>
</html>
